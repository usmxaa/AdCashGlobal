<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solve Captcha | AdCashGlobal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #0a0d15; color: white; font-family: 'Inter', sans-serif; }
        .captcha-box {
            background: linear-gradient(135deg, #1e2632 0%, #111827 100%);
            border: 2px dashed #374151;
            letter-spacing: 12px;
            text-shadow: 2px 2px 10px rgba(0, 230, 118, 0.3);
            user-select: none;
        }
        .input-focus:focus { border-color: #00e676; box-shadow: 0 0 15px rgba(0, 230, 118, 0.2); }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .error-shake { animation: shake 0.2s ease-in-out 0s 2; border-color: #ef4444 !important; }
    </style>
</head>
<body class="p-6 min-h-screen flex items-center justify-center">

    <div class="w-full max-w-md">
        <div class="flex justify-between items-center mb-8">
            <a href="index.html" class="h-10 w-10 bg-[#1e2632] rounded-full flex items-center justify-center border border-gray-800 hover:text-[#00e676] transition">
                <i class="fas fa-arrow-left"></i>
            </a>
            <div class="text-right">
                <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Balance</p>
                <p id="main-balance" class="text-[#00e676] font-black">$0.0000</p>
            </div>
        </div>

        <div class="bg-[#1e2632] p-8 rounded-[40px] border border-gray-800 shadow-2xl relative overflow-hidden">
            <h1 class="text-2xl font-black text-center mb-2 uppercase italic">Solve <span class="text-[#00e676]">Captcha</span></h1>
            <p id="limit-text" class="text-center text-gray-500 text-xs mb-8 uppercase tracking-widest">Loading tasks...</p>

            <div class="relative mb-6">
                <div id="captcha-code" class="captcha-box h-24 w-full rounded-3xl flex items-center justify-center text-3xl font-black italic text-[#00e676] select-none">
                    ......
                </div>
                <button id="refreshBtn" class="absolute top-2 right-2 h-8 w-8 bg-black/40 rounded-full flex items-center justify-center hover:text-[#00e676] transition">
                    <i class="fas fa-sync-alt text-xs"></i>
                </button>
            </div>

            <div class="space-y-4" id="input-area">
                <input type="text" id="captcha-input" placeholder="Enter Captcha Code" 
                       class="w-full bg-black/40 border border-gray-800 rounded-2xl p-5 text-center text-xl font-bold uppercase outline-none transition-all input-focus">
                
                <button id="submitBtn" class="w-full bg-[#00e676] text-black font-black py-5 rounded-2xl shadow-lg hover:scale-[1.02] active:scale-95 transition-all uppercase tracking-widest">
                    Submit & Earn $0.002
                </button>
            </div>

            <p class="text-center text-[10px] text-gray-600 mt-8 font-bold uppercase tracking-[3px]">Secure Verification System</p>
        </div>
    </div>

    <script type="module">
        import { syncUserData, addEarnings, getAdminSettings } from './core.js';

        let currentCaptcha = "";
        const reward = 0.002;
        let totalDailyLimit = 999999; // ডিফল্ট আনলিমিটেড
        let captchasDoneToday = 0;

        // ১. অ্যাপ শুরু করা এবং ডাটা লোড করা
        async function initApp() {
            const settings = await getAdminSettings();
            totalDailyLimit = settings.captchaLimit || 999999;

            syncUserData((data) => {
                document.getElementById('main-balance').innerText = `$${(data.balance || 0).toFixed(4)}`;
                captchasDoneToday = data.captchasDone || 0;
                
                const remaining = totalDailyLimit - captchasDoneToday;
                
                if (totalDailyLimit > 5000) {
                    document.getElementById('limit-text').innerText = "Unlimited Tasks Available";
                } else {
                    document.getElementById('limit-text').innerText = `Daily Tasks Left: ${remaining > 0 ? remaining : 0}`;
                }

                if (remaining <= 0 && totalDailyLimit < 5000) {
                    disableTask();
                } else {
                    generateCaptcha();
                }
            });
        }

        // ২. র্যান্ডম ক্যাপচা জেনারেট করা
        function generateCaptcha() {
            const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
            let result = "";
            for (let i = 0; i < 6; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            currentCaptcha = result;
            document.getElementById('captcha-code').innerText = result;
            document.getElementById('captcha-input').value = "";
            document.getElementById('captcha-input').classList.remove('error-shake');
        }

        // ৩. ক্যাপচা চেক করা
        async function checkCaptcha() {
            const userInput = document.getElementById('captcha-input').value.trim().toUpperCase();
            const inputEl = document.getElementById('captcha-input');
            const submitBtn = document.getElementById('submitBtn');

            if (userInput === currentCaptcha) {
                submitBtn.disabled = true;
                submitBtn.innerText = "VERIFYING...";

                try {
                    // ডাটাবেজে ব্যালেন্স যোগ
                    await addEarnings(reward);
                    
                    // সাকসেস হলে নতুন ক্যাপচা
                    generateCaptcha();
                    submitBtn.disabled = false;
                    submitBtn.innerText = "Submit & Earn $0.002";
                } catch (e) {
                    alert("Error saving progress.");
                    submitBtn.disabled = false;
                    submitBtn.innerText = "Submit & Earn $0.002";
                }
            } else {
                inputEl.classList.add('error-shake');
                setTimeout(() => inputEl.classList.remove('error-shake'), 400);
            }
        }

        function disableTask() {
            document.getElementById('input-area').innerHTML = `
                <div class="p-6 bg-red-500/10 border border-red-500/20 rounded-2xl text-center">
                    <p class="text-red-500 font-bold uppercase text-sm">Daily Limit Reached!</p>
                    <p class="text-gray-500 text-[10px] mt-1">Come back tomorrow for more tasks.</p>
                </div>
            `;
            document.getElementById('captcha-code').innerText = "LOCKED";
            document.getElementById('refreshBtn').style.display = "none";
        }

        // ইভেন্ট লিসেনার
        document.getElementById('submitBtn').addEventListener('click', checkCaptcha);
        document.getElementById('refreshBtn').addEventListener('click', generateCaptcha);
        document.getElementById('captcha-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkCaptcha();
        });

        initApp();
    </script>
</body>
</html>
