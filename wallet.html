<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet | AdCashGlobal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #080a0f; color: white; font-family: 'Inter', sans-serif; }
        .method-card { background: #161b22; border: 1px solid #1f2937; transition: 0.3s; position: relative; overflow: hidden; }
        .method-card:hover { border-color: #00e676; transform: translateY(-3px); }
        .method-card.active { border-color: #00e676; background: rgba(0, 230, 118, 0.05); }
        .method-card.active::after {
            content: '\f058'; font-family: 'Font Awesome 5 Free'; font-weight: 900;
            position: absolute; top: 10px; right: 10px; color: #00e676; font-size: 14px;
        }
        .history-item { border-bottom: 1px solid #1f2937; transition: 0.2s; }
        .history-item:hover { background: rgba(255,255,255,0.02); }
    </style>
</head>
<body class="p-5 md:p-10">
    <div class="max-w-2xl mx-auto">
        
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-black uppercase tracking-tighter italic">My <span class="text-[#00e676]">Wallet</span></h1>
            <a href="index.html" class="h-10 w-10 bg-[#161b22] rounded-full flex items-center justify-center border border-gray-800 hover:text-[#00e676] transition">
                <i class="fas fa-arrow-left"></i>
            </a>
        </div>

        <div class="bg-[#161b22] p-10 rounded-[40px] border-b-8 border-[#00e676] mb-10 shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 right-0 p-8 opacity-10">
                <i class="fas fa-wallet text-8xl text-white"></i>
            </div>
            <p class="text-gray-500 uppercase text-xs tracking-[4px] font-black">Available Balance</p>
            <h1 id="main-balance" class="text-5xl md:text-6xl font-black text-[#00e676] mt-4">$0.0000</h1>
            <p id="min-withdraw-info" class="text-gray-400 text-[10px] mt-2 font-black uppercase tracking-widest italic opacity-50">Min. Withdraw: Loading...</p>
        </div>

        <h3 class="text-xl font-bold mb-6 flex items-center gap-2 tracking-tight">
            <i class="fas fa-university text-[#00e676] text-sm"></i> Select Withdraw Method
        </h3>
        
        <div id="method-container" class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-10 text-center">
            <div class="col-span-full py-10 opacity-30 text-center uppercase font-black tracking-widest text-xs">
                <i class="fas fa-spinner animate-spin mr-2"></i> Initializing System...
            </div>
        </div>

        <div id="withdraw-form" class="hidden mb-10 bg-[#161b22] p-8 rounded-[40px] border border-[#00e676]/20">
            <div class="flex items-center gap-3 mb-6">
                <div id="selected-icon-box" class="h-12 w-12 bg-black/40 rounded-2xl flex items-center justify-center border border-gray-800 text-xl">
                    </div>
                <div>
                    <p class="text-[10px] font-black text-gray-500 uppercase tracking-widest">Withdraw via</p>
                    <h4 id="selected-name" class="font-black text-lg uppercase italic text-[#00e676]">None</h4>
                </div>
            </div>
            
            <div class="space-y-4">
                <div class="space-y-1">
                    <label class="text-[9px] font-black text-gray-600 uppercase ml-4">Account Details</label>
                    <input type="text" id="wallet-address" placeholder="Email / Wallet Address / Number" 
                        class="w-full bg-black/40 border border-gray-800 rounded-3xl p-5 text-sm font-bold focus:border-[#00e676] outline-none transition-all text-white">
                </div>
                <div class="space-y-1">
                    <label class="text-[9px] font-black text-gray-600 uppercase ml-4">Amount to Withdraw</label>
                    <input type="number" id="withdraw-amount" placeholder="Enter Amount" 
                        class="w-full bg-black/40 border border-gray-800 rounded-3xl p-5 text-sm font-bold focus:border-[#00e676] outline-none transition-all text-white">
                </div>
            </div>
        </div>

        <button id="withdrawBtn" class="w-full bg-[#00e676] text-black font-black py-6 rounded-[30px] text-xl shadow-[0_10px_30px_rgba(0,230,118,0.2)] hover:scale-[1.02] active:scale-95 transition-all uppercase tracking-tighter italic">
            Request Payment
        </button>

        <div class="mt-16 mb-10">
            <div class="flex justify-between items-end mb-6 px-2">
                <h3 class="text-xl font-black italic uppercase tracking-tighter">Transaction <span class="text-gray-600">History</span></h3>
                <span class="text-[9px] text-[#00e676] font-black uppercase tracking-widest bg-[#00e676]/10 px-3 py-1 rounded-full">Live Status</span>
            </div>

            <div class="bg-[#161b22] rounded-[45px] border border-gray-800 overflow-hidden shadow-xl" id="history-container">
                <p class="p-16 text-center text-gray-700 font-black uppercase text-[10px] tracking-[5px]">No recent transactions</p>
            </div>
            
            <p class="text-center text-[10px] text-gray-600 mt-10 font-black uppercase tracking-[4px]">Verified Security • AdCashGlobal v4.0</p>
        </div>
    </div>

    <script type="module">
        import { db, auth, syncUserData, syncGlobalSettings } from './core.js';
        import { collection, getDocs, addDoc, query, where, orderBy, doc, updateDoc, increment, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        let currentMethod = "";
        let globalMinWithdraw = 5.00; 
        let userBalance = 0;

        // ১. পেমেন্ট মেথড লোড করা (এডমিন থেকে আসবে)
        async function fetchMethods() {
            const container = document.getElementById('method-container');
            try {
                // আমরা 'payment_methods' কালেকশন থেকে ডাটা নিচ্ছি
                onSnapshot(collection(db, "payment_methods"), (snapshot) => {
                    if(snapshot.empty) {
                        container.innerHTML = `<p class="col-span-full opacity-30 text-[10px] font-black uppercase">No methods added by admin</p>`;
                        return;
                    }
                    container.innerHTML = "";
                    snapshot.forEach((doc) => {
                        const data = doc.data();
                        container.innerHTML += `
                            <div class="method-card p-6 rounded-[30px] flex flex-col items-center cursor-pointer group" 
                                 onclick="window.selectWithdrawMethod(this, '${data.name}', '${data.icon || 'https://cdn-icons-png.flaticon.com/512/2489/2489756.png'}')">
                                <img src="${data.icon || 'https://cdn-icons-png.flaticon.com/512/2489/2489756.png'}" class="h-10 w-10 object-contain mb-3 transition group-hover:scale-110">
                                <span class="font-black text-[11px] uppercase tracking-tighter">${data.name}</span>
                            </div>
                        `;
                    });
                });
            } catch (e) {
                console.error(e);
            }
        }

        // ২. গ্লোবাল সেটিংস থেকে মিনিমাম উইথড্র লিমিট সিঙ্ক করা
        syncGlobalSettings((settings) => {
            if(settings && settings.minWithdraw) {
                globalMinWithdraw = settings.minWithdraw;
                document.getElementById('min-withdraw-info').innerText = `Min. Withdraw: $${globalMinWithdraw.toFixed(2)}`;
                document.getElementById('withdraw-amount').placeholder = `Min. $${globalMinWithdraw.toFixed(2)}`;
            }
        });

        // ৩. মেথড সিলেক্ট করা
        window.selectWithdrawMethod = (el, name, icon) => {
            document.querySelectorAll('.method-card').forEach(card => card.classList.remove('active'));
            el.classList.add('active');
            currentMethod = name;
            
            const form = document.getElementById('withdraw-form');
            form.classList.remove('hidden');
            document.getElementById('selected-name').innerText = name;
            document.getElementById('selected-icon-box').innerHTML = `<img src="${icon}" class="h-6 w-6 object-contain">`;
            form.scrollIntoView({ behavior: 'smooth', block: 'center' });
        };

        // ৪. ইউজার ডাটা সিঙ্ক (ব্যালেন্স)
        syncUserData((data) => {
            userBalance = data.balance || 0;
            document.getElementById('main-balance').innerText = `$${userBalance.toFixed(4)}`;
            loadHistory();
        });

        // ৫. উইথড্র রিকোয়েস্ট সাবমিট
        document.getElementById('withdrawBtn').onclick = async () => {
            const amount = parseFloat(document.getElementById('withdraw-amount').value);
            const address = document.getElementById('wallet-address').value.trim();
            const user = auth.currentUser;

            if (!user) return alert("Please Login First!");
            if (!currentMethod) return alert("Select a Payment Method!");
            if (!address) return alert("Enter account details!");
            if (isNaN(amount) || amount < globalMinWithdraw) return alert(`Minimum withdrawal is $${globalMinWithdraw}`);
            if (amount > userBalance) return alert("Insufficient Balance!");

            if (confirm(`Confirm withdrawal of $${amount} via ${currentMethod}?`)) {
                const btn = document.getElementById('withdrawBtn');
                btn.disabled = true;
                btn.innerText = "PROCESSING...";

                try {
                    await addDoc(collection(db, "withdrawals"), {
                        uid: user.uid,
                        email: user.email,
                        method: currentMethod,
                        address: address,
                        amount: amount,
                        status: "Pending",
                        timestamp: Date.now()
                    });

                    await updateDoc(doc(db, "users", user.uid), { 
                        balance: increment(-amount) 
                    });

                    alert("Success! Request sent to Admin.");
                    document.getElementById('withdraw-amount').value = "";
                    document.getElementById('wallet-address').value = "";
                    btn.disabled = false;
                    btn.innerText = "Request Payment";
                } catch (err) {
                    console.error(err);
                    alert("Error: " + err.message);
                    btn.disabled = false;
                    btn.innerText = "Request Payment";
                }
            }
        };

        // ৬. উইথড্র হিস্ট্রি রিয়েল-টাইম লোড
        function loadHistory() {
            const user = auth.currentUser;
            if(!user) return;
            const container = document.getElementById('history-container');

            const q = query(collection(db, "withdrawals"), where("uid", "==", user.uid), orderBy("timestamp", "desc"));
            onSnapshot(q, (snapshot) => {
                if (snapshot.empty) return;
                container.innerHTML = "";
                snapshot.forEach(doc => {
                    const item = doc.data();
                    const statusClass = item.status === 'Pending' ? 'text-yellow-500 bg-yellow-500/10' : 
                                      item.status === 'Completed' ? 'text-[#00e676] bg-[#00e676]/10' : 'text-red-500 bg-red-500/10';
                    
                    container.innerHTML += `
                        <div class="history-item p-6 flex justify-between items-center">
                            <div class="flex items-center gap-4">
                                <div class="h-10 w-10 bg-gray-800/50 rounded-xl flex items-center justify-center border border-gray-700">
                                    <i class="fas fa-receipt text-[10px] text-[#00e676]"></i>
                                </div>
                                <div>
                                    <p class="font-black text-xs uppercase italic">${item.method}</p>
                                    <p class="text-[8px] text-gray-600 font-bold uppercase tracking-widest">${new Date(item.timestamp).toLocaleDateString()}</p>
                                </div>
                            </div>
                            <div class="text-right">
                                <p class="font-black text-[#00e676] text-sm">-$${item.amount.toFixed(2)}</p>
                                <span class="text-[7px] font-black uppercase px-2 py-0.5 rounded-full ${statusClass}">${item.status}</span>
                            </div>
                        </div>
                    `;
                });
            });
        }

        fetchMethods();
    </script>
</body>
</html>
