<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Offers | AdCashGlobal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #0a0d15; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .offer-card { 
            background: linear-gradient(145deg, #161b22, #1c2128);
            border: 1px solid #30363d;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .offer-card:hover { 
            border-color: #00e676; 
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 230, 118, 0.15);
        }
        .badge-premium { background: linear-gradient(90deg, #ff9800, #f44336); }
        .filter-btn.active { background-color: #00e676 !important; color: black !important; border-color: #00e676 !important; transform: scale(1.05); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .line-clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-black uppercase tracking-tighter italic">Premium <span class="text-[#00e676]">Offers</span></h1>
                <p class="text-gray-500 text-[10px] font-black uppercase tracking-[3px] mt-1">Manual Verification Required</p>
            </div>
            <a href="index.html" class="h-12 w-12 bg-[#161b22] rounded-2xl flex items-center justify-center border border-gray-800 hover:text-[#00e676] transition shadow-lg">
                <i class="fas fa-times text-xl"></i>
            </a>
        </div>

        <div class="flex gap-3 mb-8 overflow-x-auto pb-4 no-scrollbar" id="filter-container">
            <button data-type="all" class="filter-btn active bg-[#161b22] border border-gray-800 px-8 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest whitespace-nowrap transition-all shadow-md">All Jobs</button>
            <button data-type="apps" class="filter-btn bg-[#161b22] text-gray-500 border border-gray-800 px-8 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest whitespace-nowrap transition-all shadow-md">App Install</button>
            <button data-type="surveys" class="filter-btn bg-[#161b22] text-gray-500 border border-gray-800 px-8 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest whitespace-nowrap transition-all shadow-md">Surveys</button>
            <button data-type="signup" class="filter-btn bg-[#161b22] text-gray-500 border border-gray-800 px-8 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest whitespace-nowrap transition-all shadow-md">Signup</button>
        </div>

        <div id="offers-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6 min-h-[400px]">
            <div class="col-span-full text-center py-20 opacity-40">
                <div class="inline-block h-10 w-10 animate-spin rounded-full border-4 border-solid border-[#00e676] border-r-transparent align-[-0.125em] motion-reduce:animate-[spin_1.5s_linear_infinite]"></div>
                <p class="mt-6 text-[10px] font-black uppercase tracking-[4px]">Fetching Premium Jobs...</p>
            </div>
        </div>

        <div class="mt-12 bg-[#161b22] border border-blue-500/20 p-8 rounded-[40px] text-center shadow-xl">
            <p class="text-blue-400 text-[10px] font-black uppercase tracking-[4px] flex items-center justify-center gap-3">
                <i class="fas fa-user-shield text-lg"></i> Fraud detection system is active
            </p>
        </div>
    </div>

    <script type="module">
        import { db, auth, syncUserData, updateDoc, doc, increment, arrayUnion, getDocs, collection } from './core.js';

        let allOffers = [];

        // ১. ডাটাবেজ থেকে অফার লোড করা
        async function fetchOffers() {
            const grid = document.getElementById('offers-grid');
            try {
                const querySnapshot = await getDocs(collection(db, "offers"));
                allOffers = [];
                querySnapshot.forEach((docSnap) => {
                    allOffers.push({ id: docSnap.id, ...docSnap.data() });
                });
                renderOffers('all');
            } catch (error) {
                console.error("Error fetching offers:", error);
                grid.innerHTML = `<p class="col-span-full text-center text-red-500 font-bold uppercase py-20 italic">No offers found or database offline.</p>`;
            }
        }

        // ২. অফার রেন্ডার করা
        function renderOffers(filterType) {
            const grid = document.getElementById('offers-grid');
            grid.innerHTML = "";

            const filtered = filterType === 'all' ? allOffers : allOffers.filter(o => o.type === filterType);

            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full text-center py-20 bg-[#161b22] rounded-[40px] border border-dashed border-gray-800">
                        <i class="fas fa-folder-open text-4xl text-gray-700 mb-4"></i>
                        <p class="text-gray-500 text-[10px] uppercase font-black tracking-widest">No ${filterType} offers available for your region</p>
                    </div>`;
                return;
            }

            filtered.forEach(offer => {
                const reward = parseFloat(offer.reward) || 0.00;
                grid.innerHTML += `
                    <div class="offer-card p-6 rounded-[40px] flex items-center gap-6 relative overflow-hidden shadow-lg group">
                        ${offer.isHot ? '<div class="absolute top-0 right-0 badge-premium text-[8px] font-black px-6 py-1.5 rounded-bl-[25px] uppercase tracking-tighter text-white shadow-xl italic">🔥 Hot</div>' : ''}
                        
                        <div class="h-20 w-20 bg-black/40 rounded-[28px] flex-shrink-0 flex items-center justify-center border border-gray-800 group-hover:border-[#00e676]/30 transition">
                            <img src="${offer.icon || 'https://cdn-icons-png.flaticon.com/512/3135/3135715.png'}" class="h-12 w-12 object-contain" alt="Icon">
                        </div>
                        
                        <div class="flex-grow">
                            <h4 class="font-black text-lg leading-tight mb-1 italic uppercase tracking-tighter">${offer.title}</h4>
                            <p class="text-gray-500 text-[10px] mb-4 font-bold uppercase tracking-widest line-clamp-1">${offer.description}</p>
                            <div class="flex items-center justify-between">
                                <span class="text-[#00e676] font-black text-2xl tracking-tighter italic">$${reward.toFixed(2)}</span>
                                <button onclick="window.startOffer('${offer.id}', ${reward}, '${offer.link}')" 
                                    class="bg-white text-black px-6 py-2.5 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-[#00e676] transition active:scale-90 shadow-xl">
                                    GO JOB
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        // ৩. অফার শুরু এবং রিওয়ার্ড ক্রেডিট
        window.startOffer = async (offerId, reward, link) => {
            const user = auth.currentUser;
            if (!user) { alert("Please login to start tasks!"); return; }

            // কাজের লিংকে পাঠানো
            window.open(link, '_blank');

            // ইউজার কাজ শেষ করেছে কিনা তা নিশ্চিত করা (আপনি চাইলে এটি ম্যানুয়াল করতে পারেন এডমিন প্যানেল থেকে)
            setTimeout(async () => {
                if (confirm("Did you successfully complete the task?\n\nWarning: Fake submissions lead to permanent ban!")) {
                    try {
                        const userRef = doc(db, "users", user.uid);
                        await updateDoc(userRef, {
                            balance: increment(reward),
                            offersDone: increment(1),
                            completedOffers: arrayUnion(offerId) // যাতে একই অফার বারবার না পায়
                        });
                        alert(`Verified! $${reward.toFixed(2)} credited to your account.`);
                        location.reload();
                    } catch (e) {
                        console.error("Reward Update Error:", e);
                        alert("Sync error. Task recorded but reward pending.");
                    }
                }
            }, 1000);
        };

        // ৪. ফিল্টার ফাংশনালিটি
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.filter-btn').forEach(b => {
                    b.classList.remove('active');
                    b.classList.add('text-gray-500');
                });
                btn.classList.add('active');
                btn.classList.remove('text-gray-500');
                renderOffers(btn.dataset.type);
            };
        });

        // ইনিশিয়ালাইজেশন
        fetchOffers();
        syncUserData(() => {});
    </script>
</body>
</html>
