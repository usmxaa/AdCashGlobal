<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Bonus | AdCashGlobal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #0a0d15; color: white; font-family: 'Inter', sans-serif; }
        .disabled-btn { background: #1e2632 !important; color: #4b5563 !important; cursor: not-allowed; border: 1px solid #374151; }
        .glow-effect { box-shadow: 0 0 30px rgba(0, 230, 118, 0.2); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-6 flex items-center justify-center min-h-screen">

    <div class="max-w-md w-full mx-auto text-center">
        <a href="index.html" class="absolute top-10 left-6 h-12 w-12 bg-[#1e2632] rounded-full flex items-center justify-center border border-gray-800 hover:text-[#00e676] transition">
            <i class="fas fa-arrow-left"></i>
        </a>

        <div class="bg-gradient-to-b from-[#00e676] to-[#00c853] p-16 rounded-[60px] mb-8 shadow-2xl relative overflow-hidden glow-effect">
            <div class="absolute top-0 left-0 w-full h-full opacity-10 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')]"></div>
            <i class="fas fa-gift text-black text-8xl animate-bounce"></i>
            <h1 class="text-black text-4xl font-black mt-6 italic tracking-tighter uppercase">Daily <span class="opacity-70">Gift</span></h1>
        </div>
        
        <div class="bg-[#1e2632] p-10 rounded-[50px] border border-gray-800 shadow-xl relative">
            <div id="status-icon" class="mb-4 text-[#00e676] text-2xl">
                <i class="fas fa-calendar-check"></i>
            </div>
            
            <p id="bonus-status" class="text-gray-400 font-bold text-sm mb-8 leading-relaxed uppercase tracking-widest">
                Checking reward status...
            </p>

            <button id="claim-btn" class="disabled-btn w-full bg-[#00e676] text-black font-black py-6 rounded-[30px] uppercase tracking-widest text-lg hover:scale-[1.03] active:scale-95 transition-all shadow-lg" disabled>
                Please Wait
            </button>

            <div id="timer-text" class="hidden mt-6 text-xs font-black text-gray-500 uppercase tracking-[3px]">
                Next claim in: <span id="countdown" class="text-[#00e676]">--:--:--</span>
            </div>
        </div>

        <p class="mt-10 text-[10px] text-gray-600 font-black uppercase tracking-[4px]">Verified Daily Streak: <span id="streak-count" class="text-white">0</span> Days</p>
    </div>

    <script type="module">
        import { db, auth, syncUserData, getAdminSettings } from './core.js';
        import { doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        let BONUS_AMOUNT = 0.050; // ডিফল্ট
        const COOLDOWN_MS = 24 * 60 * 60 * 1000; 
        let countdownInterval;

        async function initDailyPage() {
            // ১. এডমিন থেকে বোনাস অ্যামাউন্ট আনা (যদি সেটিংস থাকে)
            const settings = await getAdminSettings();
            if(settings && settings.dailyBonus) BONUS_AMOUNT = settings.dailyBonus;

            // ২. ইউজার ডাটা সিঙ্ক করা
            syncUserData((data) => {
                const lastClaim = data.lastDailyClaim || 0;
                const now = Date.now();
                const timeLeft = lastClaim + COOLDOWN_MS - now;

                const btn = document.getElementById('claim-btn');
                const status = document.getElementById('bonus-status');
                const timerSection = document.getElementById('timer-text');
                const streakDisplay = document.getElementById('streak-count');

                streakDisplay.innerText = data.dailyStreak || 0;

                if (timeLeft > 0) {
                    // ক্লেইম করা হয়ে গেছে
                    btn.disabled = true;
                    btn.classList.add('disabled-btn');
                    btn.innerText = "Locked";
                    status.innerText = "You have already claimed today's gift!";
                    timerSection.classList.remove('hidden');
                    startTimer(timeLeft);
                } else {
                    // ক্লেইম করার জন্য রেডি
                    btn.disabled = false;
                    btn.classList.remove('disabled-btn');
                    btn.innerText = "Claim Now";
                    btn.classList.add('bg-[#00e676]');
                    status.innerText = "Your surprise reward is ready to be opened!";
                    timerSection.classList.add('hidden');
                    if(countdownInterval) clearInterval(countdownInterval);
                }
            });
        }

        function startTimer(duration) {
            if(countdownInterval) clearInterval(countdownInterval);
            const countdownEl = document.getElementById('countdown');
            
            let remaining = duration;
            countdownInterval = setInterval(() => {
                remaining -= 1000;
                if (remaining <= 0) {
                    clearInterval(countdownInterval);
                    initDailyPage();
                    return;
                }

                const h = Math.floor(remaining / 3600000);
                const m = Math.floor((remaining % 3600000) / 60000);
                const s = Math.floor((remaining % 60000) / 1000);
                countdownEl.innerText = `${h}h ${m}m ${s}s`;
            }, 1000);
        }

        // ক্লেইম ফাংশন
        window.claimDailyBonus = async () => {
            const user = auth.currentUser;
            if (!user) return;

            const btn = document.getElementById('claim-btn');
            btn.disabled = true;
            btn.innerText = "Processing...";

            try {
                const userRef = doc(db, "users", user.uid);
                await updateDoc(userRef, {
                    balance: increment(BONUS_AMOUNT),
                    lastDailyClaim: Date.now(),
                    dailyStreak: increment(1)
                });

                alert(`🎉 Awesome! You received $${BONUS_AMOUNT.toFixed(3)} bonus!`);
                // রিফ্রেশ করার দরকার নেই, syncUserData অটোমেটিক আপডেট করবে
            } catch (error) {
                console.error("Error claiming bonus:", error);
                alert("Failed to claim. Try again later.");
                btn.disabled = false;
                btn.innerText = "Claim Now";
            }
        };

        document.getElementById('claim-btn').onclick = window.claimDailyBonus;

        // পেজ লোড
        initDailyPage();
    </script>
</body>
</html>
