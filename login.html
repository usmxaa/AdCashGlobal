<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdCashGlobal - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 'inter': ['Inter', 'sans-serif'], },
                    colors: {
                        'dark-bg': '#0a0d15',
                        'card-bg': '#1e2632',
                        'primary-green': '#00e676',
                        'accent-blue': '#1877f2',
                        'input-bg': '#131924',
                        'border-gray': '#313d4f',
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .card-shadow { box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4); }
        .neon-btn { transition: 0.3s; position: relative; overflow: hidden; }
        .neon-btn:hover { box-shadow: 0 0 25px rgba(0, 230, 118, 0.4); transform: translateY(-2px); }
        .neon-btn:active { transform: translateY(0); }
        
        .bg-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(0, 230, 118, 0.05) 0%, transparent 50%);
            z-index: -1;
        }
    </style>
</head>
<body class="bg-dark-bg text-white min-h-screen flex flex-col font-inter">
    <div class="bg-glow"></div>

    <header class="w-full flex justify-between items-center p-5 px-6 lg:px-12 border-b border-border-gray sticky top-0 bg-dark-bg/80 backdrop-blur-lg z-50">
        <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.href='index.html'">
            <div class="h-10 w-10 bg-primary-green rounded-xl flex items-center justify-center shadow-[0_0_15px_rgba(0,230,118,0.3)]">
                <span class="text-black text-2xl font-black italic">A</span>
            </div>
            <span class="text-xl font-black tracking-tight italic uppercase">AdCash<span class="text-primary-green">Global</span></span>
        </div>
        
        <div>
            <button onclick="window.location.href='index.html'" class="text-gray-400 hover:text-white font-bold text-xs uppercase tracking-widest transition">Sign Up</button>
        </div>
    </header>

    <main class="flex-1 flex items-center justify-center p-5">
        <div class="w-full max-w-md bg-card-bg p-8 md:p-10 rounded-[45px] border border-border-gray card-shadow relative">
            
            <h2 class="text-3xl font-black text-center mb-8 italic uppercase tracking-tighter">Welcome <span class="text-primary-green">Back</span></h2>
            
            <form id="loginForm" class="space-y-4">
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-gray-500 uppercase ml-2 tracking-widest">Email Address</label>
                    <input type="email" id="email" required placeholder="name@example.com" class="w-full bg-input-bg p-5 rounded-2xl border border-border-gray text-white font-bold focus:border-primary-green outline-none transition">
                </div>

                <div class="space-y-1">
                    <div class="flex justify-between px-2">
                        <label class="text-[10px] font-black text-gray-500 uppercase tracking-widest">Password</label>
                        <a href="#" class="text-[10px] font-black text-primary-green uppercase tracking-widest hover:underline">Forgot?</a>
                    </div>
                    <input type="password" id="password" required placeholder="••••••••" class="w-full bg-input-bg p-5 rounded-2xl border border-border-gray text-white font-bold focus:border-primary-green outline-none transition">
                </div>
                
                <button type="submit" id="loginBtn" class="w-full bg-primary-green text-black font-black py-5 rounded-2xl text-lg tracking-widest neon-btn uppercase italic shadow-[0_10px_20px_rgba(0,230,118,0.2)]">
                    Login Account
                </button>
            </form>
            
            <div class="flex items-center gap-3 my-8">
                <div class="flex-1 h-px bg-border-gray"></div>
                <span class="text-gray-500 text-[10px] font-black uppercase tracking-[4px]">OR</span>
                <div class="flex-1 h-px bg-border-gray"></div>
            </div>
            
            <div class="grid grid-cols-3 gap-3">
                <button class="bg-input-bg border border-border-gray p-4 rounded-2xl flex items-center justify-center hover:bg-white/5 transition">
                    <img src="https://cdn-icons-png.flaticon.com/512/300/300221.png" alt="Google" class="h-6">
                </button>
                <button class="bg-input-bg border border-border-gray p-4 rounded-2xl flex items-center justify-center hover:bg-white/5 transition">
                    <img src="https://cdn-icons-png.flaticon.com/512/124/124010.png" alt="Facebook" class="h-6">
                </button>
                <button class="bg-input-bg border border-border-gray p-4 rounded-2xl flex items-center justify-center hover:bg-white/5 transition">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" alt="Apple" class="h-6 invert">
                </button>
            </div>
            
            <p class="text-center text-gray-500 text-[10px] mt-8 font-black uppercase tracking-widest">
                Don't have an account? <a href="index.html" class="text-white underline">Sign Up Now</a>
            </p>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD_B9Bu8cnavz5I1sFrXCdPRfTQL1Vhbuc",
            authDomain: "adcashglobal-3ab99.firebaseapp.com",
            projectId: "adcashglobal-3ab99",
            storageBucket: "adcashglobal-3ab99.firebasestorage.app",
            messagingSenderId: "810638190997",
            appId: "1:810638190997:web:70705c6cca822c0472ee9c",
            measurementId: "G-WW075X1XDT"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');

            btn.innerText = "Authenticating...";
            btn.disabled = true;

            signInWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    window.location.href = "dashboard.html"; 
                })
                .catch((error) => {
                    btn.innerText = "Login Account";
                    btn.disabled = false;
                    alert("Login Failed: " + error.message);
                });
        });
    </script>
</body>
</html>
