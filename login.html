<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdCashGlobal - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 'inter': ['Inter', 'sans-serif'], },
                    colors: {
                        'dark-bg': '#0a0d15',
                        'card-bg': '#1e2632',
                        'primary-green': '#00e676',
                        'accent-blue': '#1877f2',
                        'input-bg': '#131924',
                        'border-gray': '#313d4f',
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; background-color: #0a0d15; }
        .card-shadow { box-shadow: 0 10px 60px rgba(0, 0, 0, 0.6); }
        .neon-btn { transition: 0.3s; position: relative; overflow: hidden; }
        .neon-btn:hover { box-shadow: 0 0 25px rgba(0, 230, 118, 0.4); transform: translateY(-2px); }
        .neon-btn:active { transform: translateY(0); }
        .bg-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(0, 230, 118, 0.05) 0%, transparent 50%);
            z-index: -1;
        }
        input:-webkit-autofill {
            -webkit-box-shadow: 0 0 0px 1000px #131924 inset !important;
            -webkit-text-fill-color: white !important;
        }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col font-inter">
    <div class="bg-glow"></div>

    <header class="w-full flex justify-between items-center p-5 px-6 lg:px-12 border-b border-border-gray sticky top-0 bg-dark-bg/80 backdrop-blur-lg z-50">
        <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.href='index.html'">
            <div class="h-10 w-10 bg-primary-green rounded-xl flex items-center justify-center shadow-[0_0_15px_rgba(0,230,118,0.3)]">
                <span class="text-black text-2xl font-black italic">A</span>
            </div>
            <span class="text-xl font-black tracking-tight italic uppercase">AdCash<span class="text-primary-green">Global</span></span>
        </div>
        
        <div>
            <button onclick="window.location.href='register.html'" class="text-gray-400 hover:text-white font-black text-[10px] uppercase tracking-[3px] transition border border-gray-800 px-5 py-2 rounded-full hover:border-primary-green">Sign Up</button>
        </div>
    </header>

    <main class="flex-1 flex items-center justify-center p-5">
        <div class="w-full max-w-md bg-card-bg p-8 md:p-10 rounded-[45px] border border-border-gray card-shadow relative">
            
            <h2 class="text-3xl font-black text-center mb-8 italic uppercase tracking-tighter">Welcome <span class="text-primary-green">Back</span></h2>
            
            <form id="loginForm" class="space-y-5">
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-gray-500 uppercase ml-2 tracking-[2px]">Email Address</label>
                    <input type="email" id="email" required placeholder="name@example.com" 
                        class="w-full bg-input-bg p-5 rounded-[22px] border border-border-gray text-white font-bold focus:border-primary-green outline-none transition placeholder:text-gray-700">
                </div>

                <div class="space-y-1">
                    <div class="flex justify-between px-2">
                        <label class="text-[10px] font-black text-gray-500 uppercase tracking-[2px]">Password</label>
                        <button type="button" onclick="alert('Contact support to reset password.')" class="text-[10px] font-black text-primary-green uppercase tracking-widest hover:underline">Forgot?</button>
                    </div>
                    <input type="password" id="password" required placeholder="••••••••" 
                        class="w-full bg-input-bg p-5 rounded-[22px] border border-border-gray text-white font-bold focus:border-primary-green outline-none transition placeholder:text-gray-700">
                </div>
                
                <div class="pt-2">
                    <button type="submit" id="loginBtn" class="w-full bg-primary-green text-black font-black py-5 rounded-[22px] text-lg tracking-[4px] neon-btn uppercase italic shadow-[0_10px_20px_rgba(0,230,118,0.2)]">
                        Login Account
                    </button>
                </div>
            </form>
            
            <div class="flex items-center gap-3 my-8">
                <div class="flex-1 h-px bg-border-gray"></div>
                <span class="text-gray-600 text-[10px] font-black uppercase tracking-[4px]">Direct Login</span>
                <div class="flex-1 h-px bg-border-gray"></div>
            </div>
            
            <div class="grid grid-cols-3 gap-3">
                <button onclick="alert('Social login coming soon!')" class="bg-input-bg border border-border-gray p-4 rounded-[20px] flex items-center justify-center hover:bg-white/5 transition group">
                    <img src="https://cdn-icons-png.flaticon.com/512/300/300221.png" alt="Google" class="h-6 opacity-70 group-hover:opacity-100">
                </button>
                <button onclick="alert('Social login coming soon!')" class="bg-input-bg border border-border-gray p-4 rounded-[20px] flex items-center justify-center hover:bg-white/5 transition group">
                    <img src="https://cdn-icons-png.flaticon.com/512/124/124010.png" alt="Facebook" class="h-6 opacity-70 group-hover:opacity-100">
                </button>
                <button onclick="alert('Social login coming soon!')" class="bg-input-bg border border-border-gray p-4 rounded-[20px] flex items-center justify-center hover:bg-white/5 transition group">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" alt="Apple" class="h-6 invert opacity-50 group-hover:opacity-100">
                </button>
            </div>
            
            <p class="text-center text-gray-500 text-[10px] mt-8 font-black uppercase tracking-[2px]">
                New to the platform? <a href="register.html" class="text-primary-green underline decoration-dashed underline-offset-4">Register Now</a>
            </p>
        </div>
    </main>

    <div id="loadingOverlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center hidden">
        <div class="h-16 w-16 border-4 border-primary-green border-t-transparent rounded-full animate-spin"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD_B9Bu8cnavz5I1sFrXCdPRfTQL1Vhbuc",
            authDomain: "adcashglobal-3ab99.firebaseapp.com",
            projectId: "adcashglobal-3ab99",
            storageBucket: "adcashglobal-3ab99.firebasestorage.app",
            messagingSenderId: "810638190997",
            appId: "1:810638190997:web:70705c6cca822c0472ee9c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // ১. অটো-রিডাইরেক্ট লজিক: ইউজার লগইন থাকলে তাকে লগইন পেজে থাকতে দিবে না
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // ইউজার লগইন থাকলে সরাসরি ড্যাশবোর্ড (index.html) এ পাঠিয়ে দাও
                window.location.href = "index.html"; 
            }
        });

        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const overlay = document.getElementById('loadingOverlay');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            // UI Feedback
            loginBtn.disabled = true;
            loginBtn.innerText = "CHECKING...";
            overlay.classList.remove('hidden');

            try {
                // Firebase Login
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                
                // সাকসেস মেসেজ (লগইন সফল হলে onAuthStateChanged তাকে অটোমেটিক নিয়ে যাবে)
                window.location.href = "index.html"; 
                
            } catch (error) {
                overlay.classList.add('hidden');
                loginBtn.disabled = false;
                loginBtn.innerText = "Login Account";
                
                let errorMessage = "Access Denied: Invalid credentials.";
                if (error.code === 'auth/user-not-found') errorMessage = "No account found with this email.";
                if (error.code === 'auth/wrong-password') errorMessage = "Incorrect password.";
                if (error.code === 'auth/invalid-credential') errorMessage = "Wrong email or password.";
                
                alert(errorMessage);
            }
        });
    </script>
</body>
</html>
