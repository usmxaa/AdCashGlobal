<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile | AdCashGlobal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #0a0d15; color: white; font-family: 'Inter', sans-serif; }
        .profile-card { background: #161b22; border: 1px solid #30363d; }
        .stat-box { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); }
        .input-field { background: #0d1117; border: 1px solid #30363d; transition: 0.3s; }
        .input-field:focus { border-color: #00e676; outline: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-black uppercase tracking-tighter italic">User <span class="text-[#00e676]">Profile</span></h1>
            <a href="index.html" class="h-10 w-10 bg-[#161b22] rounded-full flex items-center justify-center border border-gray-800 hover:text-[#00e676] transition">
                <i class="fas fa-home"></i>
            </a>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            
            <div class="md:col-span-1 space-y-6">
                <div class="profile-card p-8 rounded-[40px] text-center relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-full h-2 bg-[#00e676]"></div>
                    <div class="relative inline-block mb-4">
                        <img id="profile-img" src="https://ui-avatars.com/api/?name=User&background=00e676&color=000&size=128" alt="User" class="rounded-3xl w-24 h-24 mx-auto border-4 border-[#1e2632]">
                        <div class="absolute bottom-0 right-0 bg-[#00e676] text-black h-8 w-8 rounded-full border-4 border-[#161b22] text-[8px] flex items-center justify-center">
                            <i class="fas fa-check"></i>
                        </div>
                    </div>
                    <h2 id="display-name" class="text-xl font-bold italic uppercase">Loading...</h2>
                    <p id="display-level" class="text-gray-500 text-xs font-bold uppercase tracking-widest mb-4">Standard Account</p>
                    <div class="inline-block bg-[#00e676]/10 px-4 py-1 rounded-full text-[#00e676] text-[10px] font-black uppercase">Verified User</div>
                </div>

                <div class="profile-card p-6 rounded-[35px] space-y-4">
                    <div class="flex justify-between items-center">
                        <span class="text-gray-500 text-xs font-bold">Account UID</span>
                        <span id="display-id" class="text-[10px] font-bold opacity-50 truncate ml-4">#LOADING</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-gray-500 text-xs font-bold">Quizzes Done</span>
                        <span id="display-tasks" class="text-sm font-bold text-[#00e676]">0</span>
                    </div>
                </div>

                <div class="bg-[#161b22] p-8 rounded-[40px] text-center border border-blue-500/30 shadow-xl shadow-blue-500/5">
                    <i class="fab fa-telegram text-6xl text-blue-400 mb-6 block"></i>
                    <h2 class="text-2xl font-black italic uppercase tracking-tighter">Join <span class="text-blue-400">Telegram</span></h2>
                    <p class="text-gray-400 text-[10px] font-black uppercase tracking-widest mt-2 mb-8 leading-relaxed">Payment proof & Support</p>
                    <a href="https://t.me/yourlink" target="_blank" class="inline-block w-full bg-blue-500 text-white py-4 rounded-2xl font-black uppercase tracking-widest hover:bg-blue-600 transition shadow-lg shadow-blue-500/20 text-xs">
                        JOIN GROUP
                    </a>
                </div>
            </div>

            <div class="md:col-span-2 space-y-6">
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="stat-box p-6 rounded-[30px]">
                        <p class="text-gray-500 text-[10px] font-bold uppercase mb-1">Current Balance</p>
                        <h3 id="main-balance" class="text-2xl font-black text-[#00e676]">$0.0000</h3>
                    </div>
                    <div class="stat-box p-6 rounded-[30px]">
                        <p class="text-gray-500 text-[10px] font-bold uppercase mb-1">Referral Earnings</p>
                        <h3 id="referral-bonus" class="text-2xl font-black text-blue-400">$0.0000</h3>
                    </div>
                </div>

                <div class="profile-card p-8 rounded-[40px]">
                    <h3 class="text-lg font-bold mb-6 flex items-center gap-2 italic uppercase">
                        <i class="fas fa-user-cog text-[#00e676]"></i> Settings
                    </h3>
                    
                    <form id="profile-form" class="space-y-5">
                        <div class="space-y-2">
                            <label class="text-[10px] font-bold text-gray-500 uppercase ml-2">Full Name</label>
                            <input type="text" id="full-name-input" class="input-field w-full p-4 rounded-2xl text-sm font-bold uppercase tracking-wider" placeholder="Update your name">
                        </div>
                        
                        <div class="space-y-2">
                            <label class="text-[10px] font-bold text-gray-500 uppercase ml-2">Email (Fixed)</label>
                            <input type="email" id="email-input" class="input-field w-full p-4 rounded-2xl text-sm font-bold opacity-40 cursor-not-allowed" disabled>
                        </div>

                        <div class="space-y-2">
                            <label class="text-[10px] font-bold text-gray-500 uppercase ml-2">Payment Address (PayPal/USDT)</label>
                            <input type="text" id="wallet-input" placeholder="Your Wallet Address" class="input-field w-full p-4 rounded-2xl text-sm font-bold">
                        </div>

                        <div class="pt-4">
                            <button type="submit" id="save-btn" class="w-full bg-[#00e676] text-black font-black py-5 rounded-2xl shadow-lg hover:scale-[1.02] transition uppercase tracking-widest text-xs">
                                UPDATE PROFILE
                            </button>
                        </div>
                    </form>
                </div>

                <div class="profile-card p-6 rounded-[35px] flex flex-col md:flex-row justify-between items-center gap-4 border-dashed border-red-500/30">
                    <div class="flex items-center gap-4">
                        <div class="h-12 w-12 bg-red-500/10 rounded-2xl flex items-center justify-center text-red-500">
                            <i class="fas fa-power-off"></i>
                        </div>
                        <div>
                            <p class="text-sm font-bold">Account Session</p>
                            <p class="text-[10px] text-gray-500 uppercase font-bold">Secure logout from this device</p>
                        </div>
                    </div>
                    <button id="logout-btn" class="bg-red-500/10 text-red-500 px-6 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-red-500 hover:text-white transition">
                        LOGOUT
                    </button>
                </div>
            </div>
        </div>

        <p class="text-center text-gray-600 text-[10px] mt-12 font-black uppercase tracking-[3px]">AdCashGlobal • System Protected</p>
    </div>

    <script type="module">
        import { db, auth, syncUserData } from './core.js';
        import { doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // ১. রিয়েল-টাইম ডাটা লোড
        syncUserData((data) => {
            const user = auth.currentUser;
            if(!user) return;

            // UI আপডেট
            document.getElementById('display-name').innerText = data.name || "User";
            document.getElementById('display-id').innerText = "#" + user.uid.substring(0, 8).toUpperCase();
            document.getElementById('display-tasks').innerText = data.quizzesDone || 0;
            document.getElementById('main-balance').innerText = "$" + (data.balance || 0).toFixed(4);
            document.getElementById('referral-bonus').innerText = "$" + (data.referEarnings || 0).toFixed(4);
            
            // ফর্ম ইনপুট
            document.getElementById('full-name-input').value = data.name || "";
            document.getElementById('email-input').value = user.email || "";
            document.getElementById('wallet-input').value = data.wallet || "";
            
            // অবতার আপডেট
            const avatarUrl = `https://ui-avatars.com/api/?name=${encodeURIComponent(data.name || 'User')}&background=00e676&color=000&size=128&bold=true`;
            document.getElementById('profile-img').src = avatarUrl;
        });

        // ২. প্রোফাইল আপডেট ফাংশন
        document.getElementById('profile-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const user = auth.currentUser;
            if(!user) return;

            const saveBtn = document.getElementById('save-btn');
            const newName = document.getElementById('full-name-input').value.trim();
            const newWallet = document.getElementById('wallet-input').value.trim();

            if(!newName) { alert("Name is required!"); return; }

            saveBtn.disabled = true;
            saveBtn.innerText = "SAVING...";

            try {
                const userRef = doc(db, "users", user.uid);
                await updateDoc(userRef, {
                    name: newName,
                    wallet: newWallet
                });
                alert("Profile Updated Successfully! ✅");
            } catch (error) {
                console.error("Update Error:", error);
                alert("Error updating profile.");
            } finally {
                saveBtn.disabled = false;
                saveBtn.innerText = "UPDATE PROFILE";
            }
        });

        // ৩. লগআউট লজিক
        document.getElementById('logout-btn').onclick = async () => {
            if(confirm("Logout from AdCashGlobal?")) {
                try {
                    await signOut(auth);
                    window.location.href = "login.html";
                } catch (error) {
                    alert("Logout failed.");
                }
            }
        };
    </script>
</body>
</html>
