<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Quiz | AdCashGlobal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #0a0d15; color: white; font-family: 'Inter', sans-serif; overflow: hidden; }
        .option-btn { background: #1e2632; transition: 0.2s; border: 1px solid #30363d; }
        .option-btn:active { transform: scale(0.95); }
        .correct { background: #00e676 !important; color: black !important; border-color: #00e676 !important; }
        .wrong { background: #ef4444 !important; color: white !important; border-color: #ef4444 !important; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-quiz { animation: slideIn 0.4s ease-out; }
    </style>
</head>
<body class="p-6 flex flex-col items-center justify-center min-h-screen">

    <div class="w-full max-w-md animate-quiz">
        <div class="flex justify-between items-center mb-8">
            <a href="tasks.html" class="h-10 w-10 bg-[#1e2632] rounded-full flex items-center justify-center border border-gray-800 hover:text-[#00e676]">
                <i class="fas fa-arrow-left"></i>
            </a>
            <div class="px-4 py-1 bg-[#00e676]/10 border border-[#00e676]/30 rounded-full">
                <p class="text-[10px] text-[#00e676] font-black uppercase tracking-widest">Score: <span id="score-display">0</span>/10</p>
            </div>
        </div>

        <div class="bg-[#1e2632] p-10 rounded-[45px] border-b-8 border-[#00e676] text-center mb-8 shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1 bg-gray-800">
                <div id="timer-bar" class="h-full bg-[#00e676] transition-all duration-1000 w-full"></div>
            </div>
            <p id="q-count" class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-4">Question 1</p>
            <h2 id="question-text" class="text-5xl font-black tracking-tighter">0 + 0 = ?</h2>
        </div>

        <div id="options-container" class="grid grid-cols-2 gap-4">
            </div>

        <p class="text-center text-[10px] text-gray-600 mt-10 font-bold uppercase tracking-[4px]">Earn Reward for 8+ Correct Answers</p>
    </div>

    <div id="quizModal" class="fixed inset-0 bg-black/90 z-50 flex items-center justify-center hidden p-6">
        <div class="bg-[#1e2632] p-10 rounded-[45px] border border-[#00e676] text-center w-full max-w-sm">
            <i class="fas fa-check-circle text-6xl text-[#00e676] mb-6"></i>
            <h1 class="text-3xl font-black mb-2">Well Done!</h1>
            <p class="text-gray-400 text-sm mb-8 uppercase font-bold tracking-widest">Quiz Completed Successfully</p>
            <h2 id="reward-display" class="text-5xl font-black text-[#00e676] mb-8 leading-none">$0.0000</h2>
            <button onclick="location.href='tasks.html'" class="w-full bg-white text-black font-black py-5 rounded-2xl hover:bg-[#00e676] transition">BACK TO TASKS</button>
        </div>
    </div>

    <script type="module">
        import { db, auth, syncUserData } from './core.js';
        import { doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        let currentQuestion = 1;
        let score = 0;
        let correctAnswer = 0;
        const totalQuestions = 10;
        const rewardPerQuiz = 0.010; // আপনি চাইলে এটি এডমিন প্যানেল থেকেও আনতে পারেন

        // ১. প্রশ্ন তৈরি করা
        function generateQuestion() {
            if (currentQuestion > totalQuestions) {
                finishQuiz();
                return;
            }

            document.getElementById('q-count').innerText = `Question ${currentQuestion}`;
            document.getElementById('score-display').innerText = score;

            const n1 = Math.floor(Math.random() * 20) + 5;
            const n2 = Math.floor(Math.random() * 15) + 2;
            const ops = ['+', '-', '*'];
            const op = ops[Math.floor(Math.random() * ops.length)];

            let qStr = "";
            if (op === '+') { correctAnswer = n1 + n2; qStr = `${n1} + ${n2}`; }
            if (op === '-') { correctAnswer = n1 - n2; qStr = `${n1} - ${n2}`; }
            if (op === '*') { correctAnswer = n1 * n2; qStr = `${n1} × ${n2}`; }

            document.getElementById('question-text').innerText = qStr + " = ?";
            renderOptions();
        }

        // ২. অপশন রেন্ডার করা
        function renderOptions() {
            const container = document.getElementById('options-container');
            container.innerHTML = "";
            
            let choices = [correctAnswer];
            while (choices.length < 4) {
                let fake = correctAnswer + (Math.floor(Math.random() * 10) - 5);
                if (!choices.includes(fake)) choices.push(fake);
            }

            choices.sort(() => Math.random() - 0.5);

            choices.forEach(val => {
                const btn = document.createElement('button');
                btn.className = "option-btn p-6 rounded-3xl font-black text-xl";
                btn.innerText = val;
                btn.onclick = () => handleAnswer(btn, val);
                container.appendChild(btn);
            });
        }

        // ৩. উত্তর চেক করা
        function handleAnswer(btn, selected) {
            const allBtns = document.querySelectorAll('.option-btn');
            allBtns.forEach(b => b.disabled = true);

            if (selected === correctAnswer) {
                btn.classList.add('correct');
                score++;
            } else {
                btn.classList.add('wrong');
                allBtns.forEach(b => {
                    if (parseInt(b.innerText) === correctAnswer) b.classList.add('correct');
                });
            }

            setTimeout(() => {
                currentQuestion++;
                generateQuestion();
            }, 1200);
        }

        // ৪. কুইজ শেষ এবং রিওয়ার্ড যোগ
        async function finishQuiz() {
            if (score >= 8) {
                const user = auth.currentUser;
                if (user) {
                    try {
                        const userRef = doc(db, "users", user.uid);
                        await updateDoc(userRef, {
                            balance: increment(rewardPerQuiz),
                            quizzesDone: increment(1)
                        });
                        
                        document.getElementById('reward-display').innerText = `$${rewardPerQuiz.toFixed(3)}`;
                        document.getElementById('quizModal').classList.remove('hidden');
                    } catch (e) {
                        alert("Error saving progress. Check connection.");
                        location.href = 'tasks.html';
                    }
                }
            } else {
                alert(`You scored ${score}/10. Need 8 correct to earn reward!`);
                location.href = 'tasks.html';
            }
        }

        // ৫. ডাটা সিঙ্ক (অপশনাল কিন্তু ভালো)
        syncUserData(() => {});

        document.addEventListener('DOMContentLoaded', generateQuestion);
    </script>
</body>
</html>
