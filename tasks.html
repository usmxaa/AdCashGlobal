<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Tasks | AdCashGlobal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #080a0f; color: white; font-family: 'Inter', sans-serif; }
        .card-glass { background: rgba(22, 27, 34, 0.8); backdrop-filter: blur(10px); border: 1px solid #30363d; transition: 0.3s; }
        .card-glass:hover { border-color: #00e676; transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .neon-btn { background: #00e676; color: #000; font-weight: 800; transition: 0.3s; cursor: pointer; text-align: center; }
        .neon-btn:hover { box-shadow: 0 0 20px rgba(0, 230, 118, 0.6); transform: scale(1.05); }
        .stat-box { background: #161b22; border-bottom: 3px solid #00e676; }
    </style>
</head>
<body class="p-5 md:p-10">
    <div class="max-w-4xl mx-auto">
        
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tighter uppercase italic">
                    Premium <span class="text-[#00e676]">Tasks</span>
                </h1>
                <p class="text-gray-500 text-[10px] font-black uppercase tracking-widest">Complete & Earn Daily</p>
            </div>
            <a href="index.html" class="h-12 w-12 bg-[#161b22] rounded-full flex items-center justify-center border border-gray-800 hover:text-[#00e676] transition">
                <i class="fas fa-times text-xl"></i>
            </a>
        </header>

        <div class="grid grid-cols-2 gap-4 mb-10">
            <div class="stat-box p-5 rounded-3xl">
                <p class="text-gray-500 text-[10px] font-black uppercase mb-1">Your Balance</p>
                <h2 id="main-balance" class="text-2xl font-black text-[#00e676]">$0.0000</h2>
            </div>
            <div class="stat-box p-5 rounded-3xl text-right">
                <p class="text-gray-500 text-[10px] font-black uppercase mb-1">Tasks Done Today</p>
                <h2 id="total-tasks-count" class="text-2xl font-black text-white">0</h2>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <div class="card-glass p-6 rounded-[35px] flex items-center gap-5">
                <div class="h-16 w-16 bg-blue-500/10 rounded-2xl flex items-center justify-center text-blue-500 text-2xl">
                    <i class="fas fa-video"></i>
                </div>
                <div class="flex-1">
                    <h3 class="font-bold text-sm tracking-tight">Watch Video Ads</h3>
                    <p class="text-[10px] text-[#00e676] font-bold uppercase tracking-tighter">Reward: $0.005 / Ad</p>
                </div>
                <a href="video.html" class="neon-btn px-6 py-2.5 rounded-2xl text-[10px] uppercase">START</a>
            </div>

            <div class="card-glass p-6 rounded-[35px] flex items-center gap-5">
                <div class="h-16 w-16 bg-purple-500/10 rounded-2xl flex items-center justify-center text-purple-500 text-2xl">
                    <i class="fas fa-gamepad"></i>
                </div>
                <div class="flex-1">
                    <h3 class="font-bold text-sm tracking-tight">Play Math Quiz</h3>
                    <p class="text-[10px] text-[#00e676] font-bold uppercase tracking-tighter">Reward: $0.010 / Win</p>
                </div>
                <a href="quiz.html" class="neon-btn px-6 py-2.5 rounded-2xl text-[10px] uppercase">PLAY</a>
            </div>

            <div class="card-glass p-6 rounded-[35px] flex items-center gap-5">
                <div class="h-16 w-16 bg-orange-500/10 rounded-2xl flex items-center justify-center text-orange-500 text-2xl">
                    <i class="fas fa-sync-alt"></i>
                </div>
                <div class="flex-1">
                    <h3 class="font-bold text-sm tracking-tight">Lucky Spin</h3>
                    <p class="text-[10px] text-[#00e676] font-bold uppercase tracking-tighter">Reward: $0.001 - $0.50</p>
                </div>
                <a href="spin.html" class="neon-btn px-6 py-2.5 rounded-2xl text-[10px] uppercase">SPIN</a>
            </div>

            <div class="card-glass p-6 rounded-[35px] flex items-center gap-5">
                <div class="h-16 w-16 bg-green-500/10 rounded-2xl flex items-center justify-center text-green-500 text-2xl">
                    <i class="fas fa-shield-alt"></i>
                </div>
                <div class="flex-1">
                    <h3 class="font-bold text-sm tracking-tight">Solve Captcha</h3>
                    <p class="text-[10px] text-[#00e676] font-bold uppercase tracking-tighter">Reward: $0.002 / Cap</p>
                </div>
                <a href="captcha.html" class="neon-btn px-6 py-2.5 rounded-2xl text-[10px] uppercase">SOLVE</a>
            </div>

        </div>

        <div class="mt-16 text-center opacity-20">
            <p class="text-[10px] font-black uppercase tracking-[5px]">AdCash Global Task Hub v2.0</p>
        </div>
    </div>

    <script type="module">
        import { syncUserData } from './core.js';

        // ইউজারের ডাটা লোড এবং আপডেট করা
        syncUserData((data) => {
            // ১. ব্যালেন্স আপডেট
            document.getElementById('main-balance').innerText = `$${(data.balance || 0).toFixed(4)}`;
            
            // ২. মোট কতগুলো কাজ করেছে তার হিসেব
            const videos = data.videosWatched || 0;
            const spins = data.spinsDone || 0;
            const captchas = data.captchasDone || 0;
            const quizzes = data.quizzesDone || 0;

            const totalDone = videos + spins + captchas + quizzes;
            document.getElementById('total-tasks-count').innerText = totalDone;
        });
    </script>
</body>
</html>
