<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard | AdCashGlobal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #0d1117; font-family: 'Inter', sans-serif; color: white; }
        .sidebar-item:hover { background-color: #161b22; color: #00e676; border-right: 4px solid #00e676; }
        .sidebar-item.active { background-color: #161b22; color: #00e676; border-right: 4px solid #00e676; }
        .card-bg { background: linear-gradient(145deg, #161b22, #1c2128); border: 1px solid #30363d; }
        .neon-text { color: #00e676; text-shadow: 0 0 10px rgba(0, 230, 118, 0.3); }
        .neon-btn { background-color: #00e676; color: #000; transition: 0.3s; cursor: pointer; }
        .neon-btn:hover { box-shadow: 0 0 20px rgba(0, 230, 118, 0.4); transform: translateY(-2px); }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col md:flex-row min-h-screen">

    <nav class="w-full md:w-64 card-bg flex flex-col p-6 space-y-6 md:sticky md:top-0 md:h-screen z-50">
        <div class="text-2xl font-black flex items-center gap-2 mb-8 italic uppercase tracking-tighter">
            <span class="neon-text"><i class="fas fa-bolt"></i></span> AdCashGlobal
        </div>
        
        <div class="flex flex-col space-y-2 flex-1">
            <a href="#" class="sidebar-item active p-3 rounded-xl flex items-center gap-3 transition-all font-bold text-sm">
                <i class="fas fa-th-large w-5"></i> Dashboard
            </a>
            <a href="#" class="sidebar-item p-3 rounded-xl flex items-center gap-3 transition-all text-gray-400 font-bold text-sm">
                <i class="fas fa-fire w-5 text-orange-500"></i> Premium Offers
            </a>
            <a href="#" class="sidebar-item p-3 rounded-xl flex items-center gap-3 transition-all text-gray-400 font-bold text-sm">
                <i class="fas fa-wallet w-5"></i> Wallet
            </a>
            <button id="logoutBtn" class="sidebar-item p-3 rounded-xl flex items-center gap-3 transition-all text-red-400 font-bold text-sm mt-4">
                <i class="fas fa-sign-out-alt w-5"></i> Logout
            </button>
        </div>

        <div class="mt-auto pt-4 border-t border-gray-800">
            <div class="flex items-center gap-3 p-2 rounded-2xl transition-all">
                <div class="relative">
                    <img id="userAvatar" src="https://ui-avatars.com/api/?name=User&background=00e676&color=000" class="rounded-full h-10 w-10 border-2 border-[#00e676]">
                    <div class="absolute bottom-0 right-0 h-3 w-3 bg-[#00e676] border-2 border-[#0a0d15] rounded-full"></div>
                </div>
                <div class="overflow-hidden">
                    <p id="userNameDisplay" class="text-sm font-black truncate">Loading...</p>
                    <p class="text-[9px] text-gray-500 font-black uppercase tracking-widest">Active Member</p>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-1 p-6 md:p-10 space-y-10 overflow-y-auto">
        <header class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="card-bg p-8 rounded-[30px] flex justify-between items-center relative overflow-hidden group">
                <div class="relative z-10">
                    <p class="text-gray-500 text-[10px] font-black uppercase tracking-[2px] mb-1">Main Balance</p>
                    <h2 id="balanceDisplay" class="text-4xl font-black neon-text italic">$0.0000</h2>
                </div>
                <div class="h-10 w-10 bg-[#00e676]/10 text-[#00e676] rounded-xl flex items-center justify-center">
                    <i class="fas fa-dollar-sign"></i>
                </div>
            </div>

            <div class="card-bg p-8 rounded-[30px] flex justify-between items-center border-b-4 border-blue-500/30">
                <div>
                    <p class="text-gray-500 text-[10px] font-black uppercase tracking-[2px] mb-1">Today's Profit</p>
                    <h2 class="text-4xl font-black italic">$0.0000</h2>
                </div>
                <div class="bg-blue-500/10 p-4 rounded-2xl"><i class="fas fa-bolt text-blue-500 text-xl"></i></div>
            </div>

            <div class="card-bg p-8 rounded-[30px] flex justify-between items-center border-b-4 border-purple-500/30">
                <div>
                    <p class="text-gray-500 text-[10px] font-black uppercase tracking-[2px] mb-1">Global Active</p>
                    <h2 class="text-4xl font-black italic">12,482</h2>
                </div>
                <div class="bg-purple-500/10 p-4 rounded-2xl animate-pulse"><i class="fas fa-circle text-purple-500 text-[10px]"></i></div>
            </div>
        </header>

        <section>
            <div class="flex justify-between items-end mb-8">
                <h3 class="text-2xl font-black uppercase italic tracking-tighter">Fast <span class="text-[#00e676]">Earnings</span></h3>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="card-bg p-8 rounded-[40px] text-center group hover:border-[#00e676] transition-all cursor-pointer">
                    <div class="h-16 w-16 bg-red-500/10 rounded-2xl flex items-center justify-center mx-auto mb-6">
                        <i class="fas fa-play text-red-500 text-2xl"></i>
                    </div>
                    <h4 class="text-lg font-black uppercase italic mb-2">Watch Ads</h4>
                    <span class="neon-btn block w-full font-black py-3 rounded-xl text-[10px] uppercase tracking-widest mt-4">Start</span>
                </div>
                </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD_B9Bu8cnavz5I1sFrXCdPRfTQL1Vhbuc",
            authDomain: "adcashglobal-3ab99.firebaseapp.com",
            projectId: "adcashglobal-3ab99",
            storageBucket: "adcashglobal-3ab99.firebasestorage.app",
            messagingSenderId: "810638190997",
            appId: "1:810638190997:web:70705c6cca822c0472ee9c",
            measurementId: "G-WW075X1XDT"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // ইউজার লগইন আছে কি না চেক করা
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // ইউজার লগইন থাকলে ডাটা দেখাবে
                const emailPrefix = user.email.split('@')[0];
                document.getElementById('userNameDisplay').innerText = emailPrefix.toUpperCase();
                document.getElementById('userAvatar').src = `https://ui-avatars.com/api/?name=${emailPrefix}&background=00e676&color=000`;
                
                // এখানে পরবর্তীতে Firestore থেকে ব্যালেন্স আনা যাবে
                document.getElementById('balanceDisplay').innerText = "$0.0000";
            } else {
                // লগইন না থাকলে লগইন পেজে পাঠিয়ে দিবে
                window.location.href = "login.html";
            }
        });

        // লগআউট হ্যান্ডলার
        document.getElementById('logoutBtn').addEventListener('click', () => {
            signOut(auth).then(() => {
                window.location.href = "login.html";
            }).catch((error) => {
                alert("Error logging out: " + error.message);
            });
        });
    </script>
</body>
</html>
